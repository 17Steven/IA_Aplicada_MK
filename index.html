<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NovaMark | Agencia de Marketing Digital</title>
  
  <!-- Carga de React -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel para compilar JSX en el navegador -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Tailwind CSS para los estilos -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- FontAwesome para los iconos -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    html { scroll-behavior: smooth; }
    @keyframes blob {
      0% { transform: translate(0px, 0px) scale(1); }
      33% { transform: translate(30px, -50px) scale(1.1); }
      66% { transform: translate(-20px, 20px) scale(0.9); }
      100% { transform: translate(0px, 0px) scale(1); }
    }
    .animate-blob { animation: blob 7s infinite; }
    .animation-delay-2000 { animation-delay: 2s; }
    .animation-delay-4000 { animation-delay: 4s; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fade-in { animation: fadeIn 0.5s ease-out forwards; }
  </style>
</head>
<body class="bg-slate-50">
  
  <!-- Aquí se montará nuestra aplicación React -->
  <div id="root"></div>

  <!-- Nuestro código de React -->
  <script type="text/babel">
    const { useState, useEffect } = React;

    // URL de tu Google Apps Script
    const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyNZ_5ySEPwVVIlQzAYsHjKfqCZPiuOfgOZJdNM6VAraWkD-V9q3164RB_GimfPBsIbNw/exec';

    function App() {
      const [currentView, setCurrentView] = useState('site'); 
      const [contactos, setContactos] = useState([]);
      const [loadingAdmin, setLoadingAdmin] = useState(false);
      const [adminError, setAdminError] = useState('');
      const [password, setPassword] = useState('');
      const [loginError, setLoginError] = useState('');

      const [isMenuOpen, setIsMenuOpen] = useState(false);
      const [formStatus, setFormStatus] = useState('idle');
      const [formData, setFormData] = useState({
        nombre: '', email: '', servicio: '', mensaje: ''
      });

      useEffect(() => {
        if (currentView === 'admin') {
          fetchContactos();
        }
      }, [currentView]);

      const toggleMenu = () => setIsMenuOpen(!isMenuOpen);

      const handleInputChange = (e) => {
        const { name, value } = e.target;
        setFormData(prev => ({ ...prev, [name]: value }));
      };

      const handleLogin = (e) => {
        e.preventDefault();
        // CONTRASEÑA DE EJEMPLO: admin123 (Cámbiala antes de publicar)
        if (password === 'admin123') {
          setLoginError('');
          setPassword('');
          setCurrentView('admin');
        } else {
          setLoginError('Contraseña incorrecta. Inténtalo de nuevo.');
        }
      };

      const handleSubmit = async (e) => {
        e.preventDefault();
        setFormStatus('submitting');
        
        try {
          await fetch(GOOGLE_SCRIPT_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify(formData)
          });
          
          setFormStatus('success');
          setFormData({ nombre: '', email: '', servicio: '', mensaje: '' });
          setTimeout(() => setFormStatus('idle'), 5000);
        } catch (error) {
          console.error('Error:', error);
          setFormStatus('idle');
          alert('Hubo un problema de conexión al enviar el mensaje.');
        }
      };

      const fetchContactos = async () => {
        setLoadingAdmin(true);
        setAdminError('');
        try {
          const response = await fetch(GOOGLE_SCRIPT_URL);
          const result = await response.json();
          if (result.status === 'success') {
            setContactos(result.data.reverse());
          } else {
            setAdminError(result.message || 'Error desconocido del servidor');
          }
        } catch (error) {
          console.error("Error al obtener contactos:", error);
          setAdminError('No se pudo cargar la lista de contactos. Verifica la conexión.');
        } finally {
          setLoadingAdmin(false);
        }
      };

      const servicios = [
        { icon: "fas fa-globe", title: 'SEO y Posicionamiento', description: 'Optimizamos tu sitio web para liderar los resultados en Google y atraer tráfico orgánico.' },
        { icon: "fas fa-mobile-alt", title: 'Gestión de Redes', description: 'Creamos comunidades fieles alrededor de tu marca con contenido altamente visual y estratégico.' },
        { icon: "fas fa-pen-nib", title: 'Marketing de Contenidos', description: 'Redactamos artículos y copys persuasivos que conectan y convierten visitantes en clientes.' },
        { icon: "fas fa-chart-line", title: 'Publicidad (PPC)', description: 'Campañas rentables en Google y Meta Ads orientadas a maximizar tu retorno de inversión.' }
      ];

      const testimonios = [
        { nombre: 'Carlos Ruiz', empresa: 'TechSolutions', texto: 'NovaMark transformó nuestra presencia online. Las ventas aumentaron un 40% en solo tres meses.' },
        { nombre: 'Laura Gómez', empresa: 'EcoLife Store', texto: 'El equipo es increíble. Entendieron nuestra marca a la perfección y la estrategia de redes fue un éxito.' },
        { nombre: 'Andrés Silva', empresa: 'Consultoría AS', texto: 'Profesionalismo y resultados medibles. Su enfoque en SEO nos posicionó como líderes en nuestro sector.' }
      ];

      // VISTA 1: LOGIN
      if (currentView === 'login') {
        return (
          <div className="min-h-screen bg-slate-50 flex items-center justify-center p-4">
            <div className="max-w-md w-full bg-white rounded-3xl shadow-xl border border-slate-100 p-8 text-center">
              <div className="w-16 h-16 bg-indigo-50 rounded-full flex items-center justify-center mx-auto mb-6">
                <i className="fas fa-key text-indigo-600 text-2xl"></i>
              </div>
              <h2 className="text-2xl font-bold text-slate-900 mb-2">Acceso Restringido</h2>
              <p className="text-slate-500 mb-8">Ingresa la clave de administrador para ver los contactos de la agencia.</p>
              
              <form onSubmit={handleLogin} className="space-y-6">
                <div>
                  <input
                    type="password" required value={password} onChange={(e) => setPassword(e.target.value)}
                    placeholder="Contraseña de administrador"
                    className="w-full px-4 py-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-indigo-600 outline-none text-center tracking-widest"
                  />
                  {loginError && <p className="text-red-500 text-sm mt-2">{loginError}</p>}
                </div>
                <button type="submit" className="w-full bg-slate-900 hover:bg-slate-800 text-white font-medium py-3 rounded-lg transition-colors">
                  Ingresar al Panel
                </button>
              </form>
              <button onClick={() => setCurrentView('site')} className="mt-6 text-slate-500 hover:text-indigo-600 text-sm flex items-center justify-center w-full">
                <i className="fas fa-arrow-left mr-2"></i> Volver al sitio web
              </button>
            </div>
          </div>
        );
      }

      // VISTA 2: ADMIN PANEL
      if (currentView === 'admin') {
        return (
          <div className="min-h-screen bg-slate-100 font-sans text-slate-900 p-4 md:p-8">
            <div className="max-w-7xl mx-auto animate-fade-in">
              <div className="flex flex-col md:flex-row md:items-center justify-between mb-8 bg-white p-6 rounded-2xl shadow-sm border border-slate-200 gap-4">
                <div className="flex items-center space-x-4">
                  <button onClick={() => setCurrentView('site')} className="p-2 bg-slate-100 text-slate-600 rounded-lg hover:bg-slate-200" title="Cerrar sesión">
                    <i className="fas fa-arrow-left"></i>
                  </button>
                  <div>
                    <h1 className="text-2xl font-bold flex items-center">
                      <i className="fas fa-database text-indigo-600 mr-3"></i> Base de Contactos
                    </h1>
                    <p className="text-slate-500 text-sm">Registros extraídos en tiempo real de Google Sheets</p>
                  </div>
                </div>
                <button onClick={fetchContactos} disabled={loadingAdmin} className="flex items-center justify-center space-x-2 bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg font-medium disabled:bg-indigo-400">
                  <i className={`fas fa-sync-alt ${loadingAdmin ? 'animate-spin' : ''}`}></i>
                  <span>Actualizar datos</span>
                </button>
              </div>

              {adminError && (
                <div className="bg-red-50 text-red-600 p-4 rounded-xl mb-6 border border-red-100 flex items-start">
                  <span className="font-bold mr-2">Error:</span> {adminError}
                </div>
              )}

              <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                {loadingAdmin && contactos.length === 0 ? (
                  <div className="p-12 text-center text-slate-500">
                    <i className="fas fa-sync-alt animate-spin text-4xl text-indigo-600 mb-4"></i>
                    <p>Sincronizando con la nube...</p>
                  </div>
                ) : contactos.length === 0 ? (
                  <div className="p-12 text-center text-slate-500 flex flex-col items-center">
                    <i className="fas fa-users text-5xl text-slate-300 mb-4"></i>
                    <p className="text-lg font-medium">Bandeja de entrada limpia.</p>
                    <p className="text-sm">Aún no hay mensajes de clientes potenciales.</p>
                  </div>
                ) : (
                  <div className="overflow-x-auto">
                    <table className="w-full text-left border-collapse">
                      <thead>
                        <tr className="bg-slate-50 border-b border-slate-200 text-slate-600 text-sm uppercase tracking-wider">
                          <th className="p-4 font-semibold">Fecha de Registro</th>
                          <th className="p-4 font-semibold">Cliente Potencial</th>
                          <th className="p-4 font-semibold">Interés</th>
                          <th className="p-4 font-semibold min-w-[300px]">Mensaje / Requerimiento</th>
                        </tr>
                      </thead>
                      <tbody className="divide-y divide-slate-100">
                        {contactos.map((contacto, index) => {
                          const fechaCruda = contacto.Fecha || contacto.fecha || contacto[''] || '';
                          let fechaFormateada = fechaCruda;
                          try {
                            if (fechaCruda) {
                              const dateObj = new Date(fechaCruda);
                              fechaFormateada = dateObj.toLocaleDateString() + ' ' + dateObj.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                            }
                          } catch(e) {}

                          return (
                            <tr key={index} className="hover:bg-slate-50 transition-colors">
                              <td className="p-4 text-sm text-slate-500 whitespace-nowrap">
                                <div className="flex items-center"><i className="far fa-calendar-alt mr-2 text-slate-400"></i>{fechaFormateada || 'N/A'}</div>
                              </td>
                              <td className="p-4">
                                <p className="font-bold text-slate-900">{contacto.Nombre || contacto.nombre || 'Desconocido'}</p>
                                <a href={`mailto:${contacto.Email || contacto.email}`} className="text-sm text-indigo-600 hover:underline">{contacto.Email || contacto.email || 'Sin email'}</a>
                              </td>
                              <td className="p-4">
                                <span className="inline-block px-3 py-1 bg-indigo-50 text-indigo-700 text-xs font-bold rounded-full uppercase tracking-wide">
                                  {contacto.Servicio || contacto.servicio || 'General'}
                               </span>
                              </td>
                              <td className="p-4 text-sm text-slate-700">
                                <p className="bg-slate-50 p-3 rounded-lg border border-slate-100 italic">"{contacto.Mensaje || contacto.mensaje || '-'}"</p>
                              </td>
                            </tr>
                          );
                        })}
                      </tbody>
                    </table>
                  </div>
                )}
              </div>
            </div>
          </div>
        );
      }

      // VISTA 3: LANDING PAGE
      return (
        <div className="font-sans text-slate-900">
          <nav className="bg-white/90 backdrop-blur-md shadow-sm sticky top-0 z-50 transition-all border-b border-slate-100">
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
              <div className="flex justify-between h-20">
                <div className="flex items-center">
                  <span className="text-2xl font-black text-indigo-600 tracking-tighter">Nova<span className="text-slate-800">Mark</span></span>
                </div>
                
                <div className="hidden md:flex items-center space-x-8">
                  <a href="#inicio" className="text-slate-600 hover:text-indigo-600 font-medium transition-colors">Inicio</a>
                  <a href="#servicios" className="text-slate-600 hover:text-indigo-600 font-medium transition-colors">Servicios</a>
                  <a href="#testimonios" className="text-slate-600 hover:text-indigo-600 font-medium transition-colors">Casos de Éxito</a>
                  <a href="#contacto" className="bg-indigo-600 text-white px-6 py-2.5 rounded-full font-medium hover:bg-indigo-700 transition-colors shadow-md shadow-indigo-200">Contactar</a>
                </div>

                <div className="md:hidden flex items-center">
                  <button onClick={toggleMenu} className="text-slate-600 p-2 focus:outline-none text-2xl">
                    <i className={isMenuOpen ? "fas fa-times" : "fas fa-bars"}></i>
                  </button>
                </div>
              </div>
            </div>

            {isMenuOpen && (
              <div className="md:hidden bg-white border-t border-slate-100 absolute w-full shadow-2xl animate-fade-in">
                <div className="px-4 py-6 space-y-2">
                  <a href="#inicio" onClick={toggleMenu} className="block px-4 py-3 text-slate-600 font-medium hover:bg-indigo-50 rounded-xl">Inicio</a>
                  <a href="#servicios" onClick={toggleMenu} className="block px-4 py-3 text-slate-600 font-medium hover:bg-indigo-50 rounded-xl">Servicios</a>
                  <a href="#testimonios" onClick={toggleMenu} className="block px-4 py-3 text-slate-600 font-medium hover:bg-indigo-50 rounded-xl">Casos de Éxito</a>
                  <a href="#contacto" onClick={toggleMenu} className="block px-4 py-3 bg-indigo-600 text-white text-center font-bold rounded-xl mt-4">Contactar</a>
                </div>
              </div>
            )}
          </nav>

          <section id="inicio" className="relative bg-white overflow-hidden pt-10 pb-20 lg:pt-20 lg:pb-28">
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10">
              <div className="text-center max-w-4xl mx-auto">
                <div className="inline-flex items-center px-4 py-2 rounded-full bg-indigo-50 text-indigo-700 font-semibold text-sm mb-6">
                  <i className="fas fa-star mr-2"></i> Agencia Digital No. 1 en 2026
                </div>
                <h1 className="text-5xl md:text-7xl font-extrabold text-slate-900 tracking-tight mb-8">
                  Escala tu negocio al <br className="hidden md:block" />
                  <span className="text-transparent bg-clip-text bg-gradient-to-r from-indigo-600 to-purple-600">siguiente nivel</span>
                </h1>
                <p className="text-xl text-slate-500 mb-10 max-w-2xl mx-auto leading-relaxed">
                  Transformamos marcas con estrategias de marketing basadas en datos, creatividad sin límites y tecnología de punta.
                </p>
                <div className="flex flex-col sm:flex-row justify-center items-center space-y-4 sm:space-y-0 sm:space-x-4">
                  <a href="#contacto" className="w-full sm:w-auto px-8 py-4 bg-indigo-600 text-white rounded-full font-bold text-lg hover:bg-indigo-700 shadow-xl shadow-indigo-200 transition-all transform hover:-translate-y-1">
                    Auditoría Gratuita
                  </a>
                  <a href="#servicios" className="w-full sm:w-auto px-8 py-4 bg-white text-slate-700 border border-slate-200 rounded-full font-bold text-lg hover:bg-slate-50 transition-all">
                    Conocer Servicios
                  </a>
                </div>
              </div>
            </div>
            
            <div className="absolute top-0 left-1/2 -translate-x-1/2 w-full h-full max-w-7xl pointer-events-none opacity-40">
              <div className="absolute top-20 -left-20 w-72 h-72 bg-indigo-300 rounded-full mix-blend-multiply filter blur-3xl animate-blob"></div>
              <div className="absolute top-40 -right-20 w-72 h-72 bg-purple-300 rounded-full mix-blend-multiply filter blur-3xl animate-blob animation-delay-2000"></div>
              <div className="absolute -bottom-20 left-1/3 w-72 h-72 bg-pink-300 rounded-full mix-blend-multiply filter blur-3xl animate-blob animation-delay-4000"></div>
            </div>
          </section>

          <section id="servicios" className="py-24 bg-slate-50 relative z-20 border-t border-slate-100">
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
              <div className="text-center max-w-3xl mx-auto mb-16">
                <h2 className="text-indigo-600 font-bold tracking-widest uppercase text-sm mb-2">Ecosistema Digital</h2>
                <p className="text-3xl md:text-4xl font-extrabold text-slate-900">Soluciones que generan impacto</p>
              </div>
              <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8">
                {servicios.map((servicio, index) => (
                  <div key={index} className="bg-white rounded-3xl p-8 shadow-sm hover:shadow-2xl transition-all duration-300 border border-slate-100 group transform hover:-translate-y-2">
                    <div className="w-16 h-16 bg-indigo-50 rounded-2xl flex items-center justify-center mb-6 group-hover:bg-indigo-600 transition-colors duration-300 text-indigo-600 group-hover:text-white">
                      <i className={`${servicio.icon} text-3xl`}></i>
                    </div>
                    <h3 className="text-xl font-bold text-slate-900 mb-3">{servicio.title}</h3>
                    <p className="text-slate-600 leading-relaxed text-sm">{servicio.description}</p>
                  </div>
                ))}
              </div>
            </div>
          </section>

          <section id="testimonios" className="py-24 bg-white border-t border-slate-100">
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
              <div className="text-center mb-16">
                <h2 className="text-indigo-600 font-bold tracking-widest uppercase text-sm mb-2">Casos de Éxito</h2>
                <p className="text-3xl md:text-4xl font-extrabold text-slate-900">Nuestros clientes hablan por nosotros</p>
              </div>
              <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                {testimonios.map((testimonio, i) => (
                  <div key={i} className="bg-slate-50 p-8 rounded-3xl border border-slate-100 relative">
                    <div className="flex text-yellow-400 mb-4">
                      {[...Array(5)].map((_, index) => <i key={index} className="fas fa-star mr-1"></i>)}
                    </div>
                    <p className="text-slate-700 italic mb-6">"{testimonio.texto}"</p>
                    <div className="flex items-center">
                      <div className="w-12 h-12 bg-indigo-200 rounded-full flex items-center justify-center text-indigo-700 font-bold text-lg mr-4">
                        {testimonio.nombre.charAt(0)}
                      </div>
                      <div>
                        <p className="font-bold text-slate-900">{testimonio.nombre}</p>
                        <p className="text-sm text-slate-500">{testimonio.empresa}</p>
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </section>

          <section id="contacto" className="py-24 bg-slate-900 relative">
            <div className="absolute inset-0 overflow-hidden pointer-events-none">
              <div className="absolute -top-1/2 -right-1/4 w-full h-full bg-gradient-to-b from-indigo-900/40 to-transparent rounded-full blur-3xl"></div>
            </div>
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10">
              <div className="bg-white rounded-[2.5rem] overflow-hidden shadow-2xl">
                <div className="grid grid-cols-1 lg:grid-cols-2">
                  
                  <div className="bg-indigo-600 text-white p-10 md:p-16 flex flex-col justify-between relative overflow-hidden">
                    <div className="absolute top-0 right-0 w-64 h-64 bg-white/10 rounded-full blur-3xl transform translate-x-1/2 -translate-y-1/2"></div>
                    <div className="relative z-10">
                      <h3 className="text-4xl font-extrabold mb-4">Iniciemos tu proyecto</h3>
                      <p className="text-indigo-100 mb-10 text-lg">
                        Completa el formulario y nuestro equipo de estrategia analizará tu caso para ofrecerte la mejor solución digital.
                      </p>
                      <div className="space-y-8">
                        <div className="flex items-center">
                          <div className="w-14 h-14 bg-white/10 rounded-2xl flex items-center justify-center mr-6 backdrop-blur-sm">
                            <i className="fas fa-envelope text-white text-xl"></i>
                          </div>
                          <div>
                            <p className="text-indigo-200 text-sm font-medium">Escríbenos directamente</p>
                            <p className="font-bold text-xl">contacto@novamark.com</p>
                          </div>
                        </div>
                        <div className="flex items-center">
                          <div className="w-14 h-14 bg-white/10 rounded-2xl flex items-center justify-center mr-6 backdrop-blur-sm">
                            <i className="fas fa-map-marker-alt text-white text-xl"></i>
                          </div>
                          <div>
                            <p className="text-indigo-200 text-sm font-medium">Oficinas Centrales</p>
                            <p className="font-bold text-xl">Centro Empresarial, Piso 8</p>
                          </div>
                        </div>
                      </div>
                    </div>
                  </div>

                  <div className="p-10 md:p-16 bg-white">
                    {formStatus === 'success' ? (
                      <div className="h-full flex flex-col items-center justify-center text-center space-y-4 py-12 animate-fade-in">
                        <div className="w-24 h-24 bg-green-50 rounded-full flex items-center justify-center mb-4">
                          <i className="fas fa-check-circle text-green-500 text-6xl"></i>
                        </div>
                        <h3 className="text-3xl font-extrabold text-slate-900">¡Mensaje Recibido!</h3>
                        <p className="text-slate-500">Un especialista se pondrá en contacto contigo en las próximas 24 horas.</p>
                        <button onClick={() => setFormStatus('idle')} className="mt-8 bg-indigo-50 text-indigo-600 font-bold py-3 px-8 rounded-full hover:bg-indigo-100 transition-colors">
                          Enviar otro mensaje
                        </button>
                      </div>
                    ) : (
                      <form onSubmit={handleSubmit} className="space-y-6">
                        <h3 className="text-2xl font-bold text-slate-900 mb-6">Datos de contacto</h3>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                          <div className="space-y-2">
                            <label className="text-sm font-bold text-slate-700">Nombre Completo</label>
                            <input type="text" name="nombre" required value={formData.nombre} onChange={handleInputChange} className="w-full px-4 py-4 bg-slate-50 rounded-xl border-transparent focus:bg-white focus:border-indigo-600 focus:ring-2 focus:ring-indigo-200 outline-none transition-all" placeholder="Ej. Juan Pérez" />
                          </div>
                          <div className="space-y-2">
                            <label className="text-sm font-bold text-slate-700">Correo Electrónico</label>
                            <input type="email" name="email" required value={formData.email} onChange={handleInputChange} className="w-full px-4 py-4 bg-slate-50 rounded-xl border-transparent focus:bg-white focus:border-indigo-600 focus:ring-2 focus:ring-indigo-200 outline-none transition-all" placeholder="juan@empresa.com" />
                          </div>
                        </div>

                        <div className="space-y-2">
                          <label className="text-sm font-bold text-slate-700">¿Qué servicio necesitas?</label>
                          <select name="servicio" required value={formData.servicio} onChange={handleInputChange} className="w-full px-4 py-4 bg-slate-50 rounded-xl border-transparent focus:bg-white focus:border-indigo-600 focus:ring-2 focus:ring-indigo-200 outline-none transition-all appearance-none cursor-pointer">
                            <option value="" disabled>Selecciona una opción...</option>
                            <option value="SEO">SEO y Posicionamiento</option>
                            <option value="Redes">Gestión de Redes Sociales</option>
                            <option value="Ads">Publicidad Digital (Ads)</option>
                            <option value="Integral">Estrategia Integral (Full-Stack)</option>
                          </select>
                        </div>

                        <div className="space-y-2">
                          <label className="text-sm font-bold text-slate-700">Cuéntanos sobre tu negocio</label>
                          <textarea name="mensaje" required rows="4" value={formData.mensaje} onChange={handleInputChange} className="w-full px-4 py-4 bg-slate-50 rounded-xl border-transparent focus:bg-white focus:border-indigo-600 focus:ring-2 focus:ring-indigo-200 outline-none transition-all resize-none" placeholder="Mis objetivos principales son..."></textarea>
                        </div>

                        <button type="submit" disabled={formStatus === 'submitting'} className="w-full bg-slate-900 hover:bg-indigo-600 text-white font-bold py-4 px-6 rounded-xl transition-all duration-300 shadow-lg hover:shadow-indigo-500/30 flex justify-center items-center disabled:opacity-70">
                          {formStatus === 'submitting' ? <><i className="fas fa-circle-notch animate-spin mr-2"></i> Procesando...</> : 'Solicitar Propuesta'}
                        </button>
                      </form>
                    )}
                  </div>
                </div>
              </div>
            </div>
          </section>

          <footer className="bg-slate-950 text-slate-400 py-12 border-t border-slate-800">
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
              <div className="flex flex-col md:flex-row justify-between items-center">
                <div className="mb-6 md:mb-0">
                  <span className="text-2xl font-black text-white tracking-tighter">Nova<span className="text-indigo-500">Mark</span></span>
                  <p className="mt-2 text-sm max-w-xs">Elevando marcas al estándar digital del mañana con estrategias comprobadas.</p>
                </div>
                
                <div className="flex space-x-6 mb-6 md:mb-0 text-xl">
                  <a href="#" className="hover:text-white transition-colors"><i className="fab fa-twitter"></i></a>
                  <a href="#" className="hover:text-white transition-colors"><i className="fab fa-linkedin"></i></a>
                  <a href="#" className="hover:text-white transition-colors"><i className="fab fa-github"></i></a>
                </div>
              </div>
              
              <div className="mt-12 pt-8 border-t border-slate-800 flex flex-col md:flex-row justify-between items-center text-sm">
                <p>© {new Date().getFullYear()} NovaMark Agency. Todos los derechos reservados.</p>
                
                <button onClick={() => setCurrentView('login')} className="mt-4 md:mt-0 flex items-center text-slate-600 hover:text-indigo-400 transition-colors">
                  <i className="fas fa-lock mr-2"></i> Portal de Empleados
                </button>
              </div>
            </div>
          </footer>
        </div>
      );
    }

    // Renderizar la aplicación en el DOM
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
